name: LocalAgent
options:
  bundleIdPrefix: com.localagent
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LocalAgent:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Shared
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localagent.LocalAgent
        INFOPLIST_FILE: Shared/Info.plist
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos macosx"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
